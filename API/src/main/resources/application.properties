spring.application.name=products-react-api

# Puerto configurable por .env (default 8080)
server.port=${SERVER_PORT:8080}

# ---- JPA / Hibernate (base) ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Seeding inicial (data.sql) ----
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Jackson ----
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ---- Manejo de errores: no exponer stacktrace al cliente ----
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.co.edu.sena.productsreact=DEBUG
