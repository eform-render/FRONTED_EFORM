spring.application.name=products-react-api

server.port=${PORT:${SERVER_PORT:8080}}

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

logging.level.org.springframework.security=INFO
logging.level.co.edu.sena.productsreact=DEBUG

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.upload-dir=${UPLOAD_DIR:uploads}

app.frontend-url=${FRONTEND_URL}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.mail.from=${MAIL_FROM}

brevo.api.key=${BREVO_API_KEY}