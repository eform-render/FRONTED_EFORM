spring.application.name=products-react-api

# Puerto configurable por Render o .env local (default 8080)
server.port=${PORT:${SERVER_PORT:8080}}

# ---- JPA / Hibernate (base) ----
# El manejo del schema se define por perfil.
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---- Seeding inicial (data.sql) ----
# spring.sql.init.mode=always
# spring.jpa.defer-datasource-initialization=true

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Jackson ----
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=America/Bogota
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ---- Manejo de errores: no exponer stacktrace al cliente ----
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.co.edu.sena.productsreact=DEBUG

# ---- Carga de imagenes de productos ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload-dir=${UPLOAD_DIR:uploads}

# ---- Recuperacion de contraseña por correo ----
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=465
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
